<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Grader - Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 460px; margin-top: 80px;">
        <h1 class="text-center mb-4">Notebook Grader</h1>

        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab"
                        data-bs-target="#login-tab" type="button">Вход</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                        data-bs-target="#register-tab" type="button">Регистрация</button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="login-tab">
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                    <div id="login-error" class="alert alert-danger mt-3 d-none"></div>
                </form>
            </div>

            <div class="tab-pane fade" id="register-tab">
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" maxlength="100" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" maxlength="64" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ФИО</label>
                        <input type="text" name="display_name" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                    <div id="register-error" class="alert alert-danger mt-3 d-none"></div>
                    <div id="register-ok" class="alert alert-success mt-3 d-none">
                        Регистрация прошла успешно. Войдите в систему.
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
