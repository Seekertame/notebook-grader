<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Grader - Задания</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Notebook Grader</span>
            <button id="logout-btn" class="btn btn-outline-light btn-sm">Выйти</button>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Мои задания</h2>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary" id="download-template-btn">
                    Скачать шаблон
                </button>
                <button class="btn btn-primary" data-bs-toggle="modal"
                        data-bs-target="#create-modal">Создать задание</button>
            </div>
        </div>

        <table class="table table-striped" id="assignments-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Название</th>
                    <th>Дисциплина</th>
                    <th>Группа</th>
                    <th>Задач</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="assignments-body"></tbody>
        </table>
        <p id="no-assignments" class="text-muted d-none">Заданий пока нет.</p>
    </div>

    <div class="modal fade" id="create-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="create-assignment-form">
                    <div class="modal-header">
                        <h5 class="modal-title">Новое задание</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Название</label>
                            <input type="text" name="title" maxlength="100" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Дисциплина</label>
                            <input type="text" name="course_name" maxlength="100" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Группа</label>
                            <input type="text" name="group_name" maxlength="50" class="form-control">
                        </div>
                        <div id="create-error" class="alert alert-danger d-none"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary">Создать</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования задания -->
    <div class="modal fade" id="edit-assignment-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="edit-assignment-form">
                    <input type="hidden" name="assignment_id">
                    <div class="modal-header">
                        <h5 class="modal-title">Редактировать задание</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Название</label>
                            <input type="text" name="title" maxlength="100" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Дисциплина</label>
                            <input type="text" name="course_name" maxlength="100" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Группа</label>
                            <input type="text" name="group_name" maxlength="50" class="form-control">
                        </div>
                        <div id="edit-error" class="alert alert-danger d-none"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/dashboard.js?v=3"></script>
</body>
</html>
